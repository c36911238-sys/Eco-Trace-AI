services:
  # Python FastAPI Backend
  - type: web
    name: ecotrace-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite+aiosqlite:///./ecotrace.db

  # Next.js Frontend
  - type: web
    name: ecotrace-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ecotrace-backend.onrender.com/api/v1 # Note: update this with your actual deployed backend service URL
